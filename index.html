<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Usage Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #444;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .last-updated {
            font-size: 12px;
            color: #888;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-subtext {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .chart-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #00d4ff;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #00d4ff;
        }
        
        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .cost-high { color: #ff6b6b; font-weight: bold; }
        .cost-medium { color: #ffd93d; font-weight: bold; }
        .cost-low { color: #6bcf7f; font-weight: bold; }
        
        .alerts {
            background: rgba(255, 107, 107, 0.1);
            border-left: 4px solid #ff6b6b;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .alert-title {
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        
        .error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 15px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Token Usage Dashboard</h1>
            <div class="last-updated">
                Updated: <span id="timestamp">—</span>
                <br>
                <button onclick="location.reload()" style="margin-top: 8px; padding: 6px 12px; background: #00d4ff; color: #000; border: none; border-radius: 6px; cursor: pointer;">Refresh</button>
            </div>
        </header>
        
        <div id="alerts-container"></div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Today's Cost</div>
                <div class="stat-value" id="today-cost">$0.00</div>
                <div class="stat-subtext" id="today-requests">0 requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">This Week</div>
                <div class="stat-value" id="week-cost">$0.00</div>
                <div class="stat-subtext">Last 7 days</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Most Used</div>
                <div class="stat-value" id="top-model">—</div>
                <div class="stat-subtext" id="top-model-cost">$0.00</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">📊 Cost by Provider (Today)</div>
                <canvas id="providerChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">📈 Hourly Trend (24h)</div>
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">🔝 Top Models Today</div>
            <table>
                <thead>
                    <tr>
                        <th>Model</th>
                        <th>Requests</th>
                        <th>Cost</th>
                    </tr>
                </thead>
                <tbody id="models-table">
                    <tr><td colspan="3" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let providerChart, hourlyChart;
        
        async function loadData() {
            try {
                const response = await fetch('./data.json');
                if (!response.ok) throw new Error('Failed to load data');
                
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                document.querySelector('.chart-container').innerHTML = 
                    `<div class="error">⚠️ Cannot load data. Make sure monitor runs: <code>python3 /root/.hermes/skills/devops/token-usage-monitor/scripts/monitor.py</code></div>`;
            }
        }
        
        function renderDashboard(data) {
            // Update timestamp
            document.getElementById('timestamp').textContent = 
                new Date(data.timestamp).toLocaleString();
            
            // Update stat cards
            const todayTotal = data.today.total || 0;
            const weekTotal = data.week.total || 0;
            const topModel = data.today.models[0];
            
            document.getElementById('today-cost').textContent = `$${todayTotal.toFixed(4)}`;
            document.getElementById('week-cost').textContent = `$${weekTotal.toFixed(4)}`;
            document.getElementById('top-model').textContent = topModel ? topModel.name.split('/').pop() : '—';
            document.getElementById('top-model-cost').textContent = topModel ? `$${topModel.cost.toFixed(4)}` : '$0.00';
            document.getElementById('today-requests').textContent = 
                data.today.models.reduce((sum, m) => sum + m.requests, 0) + ' requests';
            
            // Provider chart
            const providers = Object.keys(data.today.by_provider || {});
            const providerCosts = providers.map(p => data.today.by_provider[p] || 0);
            
            const providerCtx = document.getElementById('providerChart');
            if (providerChart) providerChart.destroy();
            providerChart = new Chart(providerCtx, {
                type: 'doughnut',
                data: {
                    labels: providers.map(p => p || 'Unknown'),
                    datasets: [{
                        data: providerCosts,
                        backgroundColor: ['#00d4ff', '#00ff88', '#ffd93d', '#ff6b6b', '#a8e6cf'],
                        borderColor: '#1a1a2e',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#e0e0e0' }
                        }
                    }
                }
            });
            
            // Hourly chart
            const hourly = data.hourly_24h || [];
            const hourlyCtx = document.getElementById('hourlyChart');
            if (hourlyChart) hourlyChart.destroy();
            hourlyChart = new Chart(hourlyCtx, {
                type: 'line',
                data: {
                    labels: hourly.map(h => h.hour),
                    datasets: [{
                        label: 'Cost (USD)',
                        data: hourly.map(h => h.cost || 0),
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#00ff88',
                        pointBorderColor: '#00d4ff'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#e0e0e0' } }
                    },
                    scales: {
                        y: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
            
            // Models table
            const tbody = document.getElementById('models-table');
            tbody.innerHTML = data.today.models.map(m => {
                const costClass = m.cost < 0.01 ? 'cost-low' : m.cost < 0.05 ? 'cost-medium' : 'cost-high';
                return `
                    <tr>
                        <td>${m.name}</td>
                        <td>${m.requests}</td>
                        <td class="${costClass}">$${m.cost.toFixed(4)}</td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="3">No data yet</td></tr>';
        }
        
        // Load on page load and refresh every 5 minutes
        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
